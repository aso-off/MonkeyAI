name: Backend CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "configs/version.yml"
      - "mini-app/public/version.json"
  pull_request:
    paths-ignore:
      - "configs/version.yml"
      - "mini-app/public/version.json"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Job 1: Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra api --extra bot --group dev --no-install-project

      - name: Ruff lint
        run: .venv/bin/ruff check api bot

  # Job 2: Locale validation (bot + mini-app)
  locale-check:
    name: Locale keys validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest faker pyyaml

      - name: Bot locale keys
        run: pytest bot/tests/unit/test_bot_locale_keys.py -v

  # Job 3: Unit tests + coverage
  unit-tests:
    name: Unit tests (coverage ≥ 60%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra api --extra bot --group dev --no-install-project

      - name: Health smoke tests
        run: .venv/bin/python -m pytest -q api/tests/test_api_health.py bot/tests/test_bot_health.py

      - name: Unit tests + coverage
        run: >-
          .venv/bin/python -m pytest -q
          api/tests/unit bot/tests/unit
          --cov=api/src
          --cov=bot/src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-unit
          path: coverage.xml
          retention-days: 14