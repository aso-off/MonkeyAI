name: Monkey Backend CD

on:
  workflow_run:
    workflows: ["Monkey Backend CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            file: api/Dockerfile
            image: monkey-api
          - service: bot
            file: bot/Dockerfile
            image: monkey-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOSTNAME }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: ${{ secrets.SSH_TIMEOUT }}
          command_timeout: 15m
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            PROJECT="${{ secrets.SSH_PROJECT_PATH }}"
            REPO="git@github.com:${{ github.repository }}.git"
            cd "$PROJECT"

            git_sync() {
              git sparse-checkout init --no-cone
              git sparse-checkout set '/*' '!api/' '!bot/' '!mini-app/'
              git fetch origin main
              git reset --hard origin/main
            }

            if [ ! -d "$PROJECT/.git" ]; then
              git init
              git remote add origin "$REPO" 2>/dev/null || git remote set-url origin "$REPO"
              git fetch origin main
              git_sync
            else
              git_sync
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose restart cloudflared

            docker system prune -af