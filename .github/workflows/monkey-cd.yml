name: Backend CD

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.5.1), empty = dev'
        required: false
        default: 'dev'

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and build time
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: steps.meta.outputs.version != 'dev'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUILD_TIME="${{ steps.meta.outputs.build_time }}"

          CREATION_DATE=$(python3 -c "import yaml; print(yaml.safe_load(open('configs/version.yml')).get('creation_date','2025-02-01'))")
          printf 'version: "%s"\ncreation_date: "%s"\nbuild_time: "%s"\n' \
            "$VERSION" "$CREATION_DATE" "$BUILD_TIME" > configs/version.yml

          printf '{"version":"%s","buildTime":"%s"}\n' "$VERSION" "$BUILD_TIME" \
            > mini-app/public/version.json

          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          (cd mini-app && npm version "$VERSION" --no-git-tag-version)

      - name: Commit and push version files
        if: steps.meta.outputs.version != 'dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/version.yml mini-app/public/version.json \
                  pyproject.toml mini-app/package.json mini-app/package-lock.json
          git diff --staged --quiet || \
            git commit -m "release v${{ steps.meta.outputs.version }}"
          git push origin HEAD:main

  test:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra api --extra bot --group dev --no-install-project

      - name: Full tests with coverage gate (≥ 80%)
        run: >-
          .venv/bin/python -m pytest -q
          api/tests/ bot/tests/
          --cov=api/src
          --cov=bot/src
          --cov-report=term-missing
          --cov-fail-under=80

  build:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            file: api/Dockerfile
            image: monkey-api
          - service: bot
            file: bot/Dockerfile
            image: monkey-bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.prepare.outputs.version }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_TIME=${{ needs.prepare.outputs.build_time }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          USER_IDS_YML_B64: ${{ secrets.USER_IDS_YML_B64 }}
          CHAT_MODES_YML_B64: ${{ secrets.CHAT_MODES_YML_B64 }}
        with:
          host: ${{ secrets.SSH_HOSTNAME }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: ${{ secrets.SSH_TIMEOUT }}
          command_timeout: 15m
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,USER_IDS_YML_B64,CHAT_MODES_YML_B64
          script: |
            set -e
            PROJECT="${{ secrets.SSH_PROJECT_PATH }}"
            REPO="git@github.com:${{ github.repository }}.git"
            cd "$PROJECT"

            git_sync() {
              git sparse-checkout init --no-cone
              git sparse-checkout set '/*' '!api/' '!bot/' '!mini-app/'
              git fetch origin main
              git reset --hard origin/main
            }

            if [ ! -d "$PROJECT/.git" ]; then
              git init
              git remote add origin "$REPO" 2>/dev/null || git remote set-url origin "$REPO"
              git fetch origin main
              git_sync
            else
              git_sync
            fi

            # приватные конфиги из Secrets (в репо их нет)
            mkdir -p configs
            printf '%s' "$USER_IDS_YML_B64" | base64 -d > configs/user-ids.yml
            printf '%s' "$CHAT_MODES_YML_B64" | base64 -d > configs/chat_modes.yml

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose --env-file .env --env-file secrets.env pull
            docker compose --env-file .env --env-file secrets.env up -d --remove-orphans
            docker compose --env-file .env --env-file secrets.env up -d --build pg_backup
            docker compose --env-file .env --env-file secrets.env restart cloudflared

            docker system prune -af