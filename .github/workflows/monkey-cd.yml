name: Monkey Backend CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "mini-app/**"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen --extra api --extra bot --group dev --no-install-project

      - name: Ruff lint
        run: .venv/bin/ruff check api bot

      - name: Health smoke tests
        run: .venv/bin/python -m pytest -q api/tests/test_api_health.py bot/tests/test_bot_health.py

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/monkey-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/monkey-api:${{ github.sha }}

      - name: Build and push BOT image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/monkey-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/monkey-bot:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOSTNAME }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: ${{ secrets.SSH_TIMEOUT }}
          command_timeout: 15m
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -e
            PROJECT="${{ secrets.SSH_PROJECT_PATH }}"
            REPO="git@github.com:${{ github.repository }}.git"
            cd "$PROJECT"

            git_sync() {
              git sparse-checkout init --no-cone
              git sparse-checkout set '/*' '!api/' '!bot/' '!mini-app/'
              git fetch origin main
              git reset --hard origin/main
            }

            if [ ! -d "$PROJECT/.git" ]; then
              git init
              git remote add origin "$REPO" 2>/dev/null || git remote set-url origin "$REPO"
              git fetch origin main
              git_sync
            else
              git_sync
            fi

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
