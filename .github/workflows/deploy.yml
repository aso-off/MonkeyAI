name: Deploy Mini App to GitHub Pages repo

on:
  push:
    branches: [main]
    paths:
      - "mini-app/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: |
          cd mini-app && npm ci

      - name: Build mini-app
        run: |
          cd mini-app && npm run build

      - name: Deploy dist to public repo
        run: |
          cd mini-app/dist

          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -B main

          git add .
          git commit -m "Deploy: ${{ github.sha }}"

          git push -f https://${{ secrets.PAGES_TOKEN }}@github.com/aso-off/mini-app.git main