name: Cleanup old runs

on:
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Delete completed runs older than N days"
        type: choice
        options: ["14", "21", "30"]
        default: "14"

concurrency:
  group: cleanup-runs
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      KEEP_DAYS: ${{ github.event.inputs.keep_days || '14' }}
      KEEP_LAST: "10"
    steps:
      - name: Delete old runs (keep last 10 per workflow)
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "$KEEP_DAYS days ago" +%s)

          runs=$(gh api --paginate "repos/$GH_REPO/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | {id, createdAt: .created_at, status, name}' | jq -s '.')

          to_delete=$(echo "$runs" | jq -r --argjson keep "$KEEP_LAST" --argjson cutoff "$cutoff" '
              group_by(.name)[]
              | (sort_by(.createdAt) | reverse | .[$keep:])
              | .[]
              | select(.status == "completed")
              | select((.createdAt | fromdateiso8601) < $cutoff)
              | [.id, .name] | @tsv
            ')

          total=0
          declare -A counts
          if [ -n "$to_delete" ]; then
            while IFS=$'\t' read -r id wf; do
              [ -z "$id" ] && continue
              if gh run delete "$id"; then
                counts["$wf"]=$(( ${counts["$wf"]:-0} + 1 ))
                total=$(( total + 1 ))
                echo "deleted $id ($wf)"
              fi
            done <<< "$to_delete"
          fi

          {
            echo "## Cleanup old runs"
            echo ""
            echo "- Older than: **${KEEP_DAYS} days** · keep last **${KEEP_LAST}** per workflow"
            echo ""
            if [ "$total" -eq 0 ]; then
              echo "_Nothing to delete._"
            else
              echo "| Workflow | Deleted |"
              echo "|:--|--:|"
              for wf in "${!counts[@]}"; do
                echo "| ${wf} | ${counts[$wf]} |"
              done
              echo "| **Total** | **${total}** |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
