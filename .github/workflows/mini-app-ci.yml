name: Mini-App CI

on:
  push:
    branches: [main]
    paths:
      - "mini-app/**"
  pull_request:
    paths:
      - "mini-app/**"

concurrency:
  group: mini-app-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
