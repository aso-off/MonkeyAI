name: Mini-App CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: mini-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and build time
        id: meta
        working-directory: .
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ "${{ github.ref_type }}" != "tag" ]; then VERSION="dev"; fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Generate public/version.json
        run: |
          printf '{"version":"%s","buildTime":"%s"}\n' \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.build_time }}" \
            > public/version.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump package.json version
        if: steps.meta.outputs.version != 'dev'
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mini-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
