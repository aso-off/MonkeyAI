name: Mini App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "mini-app/**"

concurrency:
  group: mini-app-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy dist to public repo
        working-directory: mini-app/dist
        run: |
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -B main

          git add .
          git commit -m "Deploy: ${{ github.event.head_commit.message }}"

          git push -f https://${{ secrets.PAGES_TOKEN }}@github.com/aso-off/mini-app.git main