name: Mini App CI/CD

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: mini-app-deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mini-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and build time
        id: meta
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Generate public/version.json
        run: |
          printf '{"version":"%s","buildTime":"%s"}\n' \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.build_time }}" \
            > public/version.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump package.json version
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy dist to public repo
        working-directory: mini-app/dist
        run: |
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -B main

          git add .
          git commit -m "Deploy: v${{ steps.meta.outputs.version }}"

          git push -f https://${{ secrets.PAGES_TOKEN }}@github.com/aso-off/mini-app.git main