name: Load tests

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Load profile"
        type: choice
        options: [load, stress, spike, all]
        default: load
      users:
        description: "Users (-u), load profile only"
        default: "150"
      run_time:
        description: "Duration (-t), load profile only"
        default: "2m"

concurrency:
  group: load-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MONKEY_CONFIGS_DIR: ${{ github.workspace }}/configs
  MONKEY_LOG_DIR: ${{ github.workspace }}/logs
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  POSTGRES_DB: monkey_test
  POSTGRES_USER: monkey_test
  POSTGRES_PASSWORD: monkey_test
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  OPENAI_API_KEY: sk-load
  TELEGRAM_TOKEN: "123456:load-token"
  API_SERVICE_TOKEN: load-service-token
  LOAD_BASE_URL: http://localhost:8000

jobs:
  # Manual run: chosen profile, or "all" for every profile
  full:
    name: Load profiles
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: monkey_test
          POSTGRES_PASSWORD: monkey_test
          POSTGRES_DB: monkey_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U monkey_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra api --extra bot --group dev --group load --no-install-project

      - name: Point OpenAI to mock
        run: 'echo "openai_api_base: http://127.0.0.1:9090/v1" >> configs/config.yml'

      - name: Alembic upgrade
        run: .venv/bin/alembic -c api/alembic.ini upgrade head

      - name: Run profiles
        env:
          USERS: ${{ github.event.inputs.users || '150' }}
          RUN_TIME: ${{ github.event.inputs.run_time || '2m' }}
        run: |
          mkdir -p logs
          .venv/bin/python -m uvicorn mock_openai:app --app-dir tests/load --port 9090 > logs/mock.log 2>&1 &
          MOCK_PID=$!
          PYTHONPATH=api/src .venv/bin/python -m uvicorn main:app --app-dir api --port 8000 > logs/api-server.log 2>&1 &
          API_PID=$!
          UP=0
          for _ in $(seq 1 30); do curl -sf http://localhost:8000/health >/dev/null && { UP=1; break; }; sleep 2; done
          if [ "$UP" != 1 ]; then
            echo "::error::API failed to start"; tail -n 50 logs/api.log 2>/dev/null || true
            kill $MOCK_PID $API_PID 2>/dev/null || true
            exit 1
          fi

          echo "::group::Diagnostic single /chat/complete"
          curl -s -X POST http://localhost:8000/chat/complete \
            -H "Authorization: Bearer ${API_SERVICE_TOKEN}" -H "Content-Type: application/json" \
            -d '{"user_id":12345,"message":"hi","model":"gpt-5.4-nano","chat_mode":"assistant"}' \
            -w '\nHTTP_CODE=%{http_code}\n'
          echo "--- api.log (app logger — has traceback) ---"
          cat logs/api.log 2>/dev/null || true
          echo "::endgroup::"

          if [ "${{ github.event.inputs.profile }}" = "all" ]; then
            PROFILES="load stress spike"
          else
            PROFILES="${{ github.event.inputs.profile }}"
          fi

          for p in $PROFILES; do
            if [ "$p" = "load" ]; then
              ARGS="-u $USERS -r 20 --run-time $RUN_TIME"
            else
              ARGS=""  # shape drives the profile
            fi
            .venv/bin/locust -f "tests/load/locust_$p.py" --headless --only-summary \
              --html "report-$p.html" --csv "report-$p" $ARGS || true
          done

          kill $MOCK_PID $API_PID 2>/dev/null || true

          echo "::group::API log (tail)"
          tail -n 200 logs/api.log 2>/dev/null || true
          echo "::endgroup::"

      - name: Load summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv, glob

          rows = []
          for f in sorted(glob.glob("report-*_stats.csv")):
              prof = f[len("report-"):-len("_stats.csv")]
              with open(f, newline="") as fh:
                  for r in csv.DictReader(fh):
                      if r.get("Name") != "Aggregated":
                          continue
                      reqs = int(float(r["Request Count"]))
                      fails = int(float(r["Failure Count"]))
                      failpct = (fails / reqs * 100) if reqs else 0.0
                      p50 = r.get("50%") or r.get("Median Response Time", "")
                      rows.append((prof, reqs, failpct, p50,
                                   r.get("95%", ""), r.get("99%", ""), float(r.get("Requests/s") or 0)))

          out = ["# 📊 Load Test Report", ""]
          if not rows:
              out.append("_No stats produced._")
          else:
              out += ["| Profile | Requests | Fail % | p50 | p95 | p99 | RPS |",
                      "|:--|--:|--:|--:|--:|--:|--:|"]
              for prof, reqs, failpct, p50, p95, p99, rps in rows:
                  flag = "✅" if failpct < 1 else "⚠️"
                  out.append(f"| {flag} {prof} | {reqs:,} | {failpct:.2f} % | "
                             f"{p50} ms | {p95} ms | {p99} ms | {rps:.1f} |")
          out.append("")
          print("\n".join(out))
          PY

      - name: Upload load reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-reports
          path: |
            report-*.html
            report-*.csv
            logs/api.log
            logs/api-server.log
          retention-days: 14
