version: 2
updates:
  # Python (pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  # Mini App (npm)
  - package-ecosystem: "npm"
    directory: "/mini-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Базовые образы Docker
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/bot"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/deployment/backup"
    schedule:
      interval: "weekly"
