version: 2
updates:
  # Python (pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]
    # без мажоров - только patch/minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Mini App (npm)
  - package-ecosystem: "npm"
    directory: "/mini-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Базовые образы Docker
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
    # python: только патчи 3.11.x
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: "docker"
    directory: "/bot"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: "docker"
    directory: "/deployment/backup"
    schedule:
      interval: "weekly"
    # postgres: без мажора (без 18)
    ignore:
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
