global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "monkey-bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:5000"]

  - job_name: "monkey-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "cadvisor"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "redis"
    metrics_path: /metrics
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: "postgres"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]