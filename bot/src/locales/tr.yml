    artist_welcome: "🎨 Merhaba, ben <b>sanatsal becerilere sahip bir Monkey</b>'yim. Bana yazdığın her şeyi çizeceğim (örneğin <i>Times Square'de selfie çeken bir maymun, illüstrasyon</i>)"
