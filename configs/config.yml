# Доступ
whitelist_mode: true
busy_lock_ttl_seconds: 300  # анти-дубль

# Диалог
n_chat_modes_per_page: 5
dialog_context_limit: 20  # контекст
user_cache_ttl_seconds: 45  # кэш профиля в боте

# Retention (сезон - 90 дней)
retention:
  enabled: true
  dialogs_inactive_days: 90  # по последней активности
  reactions_days: 90
  interval_hours: 24
  batch_size: 500

# Стриминг и модерация
enable_message_streaming: true
enable_content_moderation: true
draft_throttle_seconds: 0.4  # троттлинг
message_max_length: 4096  # лимит TG
enable_rich_messages: true  # Bot API 10.1
rich_message_max_length: 32768  # лимит rich
enable_thinking_block: true  # tg-thinking в драфте
message_effect_id: ""  # эффект

# Загрузки
max_upload_mb: 8  # лимит файла до скачивания
max_voice_duration_sec: 600  # лимит голосового

# Сеть
api_request_timeout_seconds: 120  # таймаут API
throttle_rate_ms: 1000  # троттл

# OpenAI
openai_api_base: null
return_n_generated_images: 1
image_size: 1024x1024
image_quality: medium

# Лимиты (общий счётчик бот+мини-апп, окно от первого сообщения)
# premium = Telegram Premium (из initData / event_from_user), в БД не хранится
limit_window_seconds: 3600
msg_limit_default: 15      # текст + анализ фото + голос
msg_limit_premium: 30
image_limit_default: 5     # генерация картинок
image_limit_premium: 5

# Цены
chatgpt_price_per_1000_tokens: 0.00275
gpt_price_per_1000_tokens: 0.01
whisper_price_per_1_min: 0.006

# Модерация
moderation_thresholds:
  harassment: 0.8
  harassment/threatening: 0.5
  hate: 0.8
  hate/threatening: 0.5
  illicit: 0.9
  illicit/violent: 0.6
  self-harm: 0.8
  self-harm/intent: 0.5
  sexual: 0.8
  sexual/minors: 0.4
  violence: 0.8
  violence/graphic: 0.5

# Mini-App
webapp_url: 'https://aso-off.github.io/MonkeyAI/'

# Docker-контейнеры для мониторинга (system info)
container_names:
  - monkey_api
  - monkey_bot
  - monkey_postgres
  - monkey_pg_backup
  - monkey_redis
  - monkey_cloudflared
  - monkey_prometheus
  - monkey_postgres_admin
  - monkey_loki
  - monkey_promtail
  - monkey_cadvisor
  - monkey_grafana
  - monkey_redisinsight
  - monkey_npm
  - monkey_umami